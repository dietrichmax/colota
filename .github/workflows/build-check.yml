name: Android Build Check

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '!fastlane/**'
      - 'packages/shared/**'
      - 'package-lock.json'
      - '.github/workflows/build-check.yml'
      - '.github/actions/setup-build/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '!fastlane/**'
      - 'packages/shared/**'
      - 'package-lock.json'
      - '.github/workflows/build-check.yml'
      - '.github/actions/setup-build/**'

concurrency:
  group: build-check-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup build environment
        uses: ./.github/actions/setup-build

      - name: Run ESLint
        run: npm run lint -w @colota/mobile

      - name: Run TypeScript check
        run: npx -w @colota/mobile tsc --noEmit

      - name: Run tests
        run: npm test -w @colota/mobile

      - name: Run Kotlin unit tests
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew testGmsDebugUnitTest testFossDebugUnitTest --no-daemon

  build-gms:
    name: Build GMS Debug APK
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup build environment
        uses: ./.github/actions/setup-build

      - name: Build GMS Debug APK
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleGmsDebug --no-daemon

  build-foss:
    name: Build FOSS Debug APK
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup build environment
        uses: ./.github/actions/setup-build

      - name: Build FOSS Debug APK
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleFossDebug --no-daemon
