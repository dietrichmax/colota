# ============================
# CI / build automation
# ============================
ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'fastlane/**'
          - 'scripts/**'

# ============================
# Android / Native Kotlin
# ============================
android:
  - changed-files:
      - any-glob-to-any-file:
          - 'apps/mobile/android/**'

# ============================
# React Native UI (TypeScript / JSX)
# ============================
mobile-ui:
  - changed-files:
      - any-glob-to-any-file:
          - 'apps/mobile/src/**'
          - 'apps/mobile/*.ts'
          - 'apps/mobile/*.tsx'
          - 'apps/mobile/*.js'

# ============================
# Tests (both Kotlin and TS/TSX)
# ============================
tests:
  - changed-files:
      - any-glob-to-any-file:
          - '**/__tests__/**'
          - '**/*.test.ts'
          - '**/*.test.tsx'
          - '**/*Test.kt'

# ============================
# Documentation (Docusaurus site + repo markdown)
# ============================
docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'apps/docs/**'
          - '**/*.md'

# ============================
# Shared package (types, theme)
# ============================
shared:
  - changed-files:
      - any-glob-to-any-file:
          - 'packages/shared/**'

# ============================
# Dependency bumps (useful for Dependabot routing)
# ============================
deps:
  - changed-files:
      - any-glob-to-any-file:
          - '**/package.json'
          - '**/package-lock.json'
          - '**/build.gradle'
          - '**/build.gradle.kts'
          - '**/Gemfile'
          - '**/Gemfile.lock'
